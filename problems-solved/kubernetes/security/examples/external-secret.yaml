apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-external-secret
  namespace: {{ .Values.namespace }}
spec:
  secretStoreRef:
    name: {{ .Release.Name }}-secret-store
    kind: SecretStore

  refreshInterval: 1h

  target:
    name: {{ .Release.Name }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # ⚠️ Helm and ESO both use {{ }} syntax.
        # Use {{ "{{" }} to pass literal {{ }} through Helm to ESO.
        # Without this, Helm renders variables as empty strings.
        application-secret.properties: |
          {{- range $key, $val := .Values.externalSecrets.keys }}
          {{ $val }}={{ "{{" }} .{{ $key }} {{ "}}" }}
          {{- end }}

  # All remoteRef.key point to the same AWS secret.
  # remoteRef.property extracts one JSON key from it.
  # ⚠️ Use range $key, $val consistently — mixing range styles
  # causes "undefined variable $val" errors.
  data:
  {{- range $key, $val := .Values.externalSecrets.keys }}
  - secretKey: {{ $key }}
    remoteRef:
      key: {{ $.Values.externalSecrets.env }}/{{ $.Release.Name }}
      property: {{ $val }}
  {{- end }}

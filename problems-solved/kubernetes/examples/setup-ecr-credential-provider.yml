---
# ecr-credential-provider setup for self-managed Kubernetes
#
# Run against: all nodes (master + workers)
# Usage: ansible-playbook -i inventory setup-ecr-credential-provider.yml
#
# Version matching:
#   k8s 1.29.x → v1.29.10
#   k8s 1.30.x → v1.30.10
#   k8s 1.31.x → v1.31.9
#   k8s 1.32.x → v1.32.6
#   k8s 1.33.x → v1.33.2
---
- name: Setup ECR credential provider (official source)
  hosts: all
  become: true
  vars:
    k8s_version: "v1.36.0" # ← change to match your k8s version
    go_version: "1.24.3"
    ecr_provider_bin: "/usr/local/bin/ecr-credential-provider"
    ecr_provider_config: "/etc/kubernetes/ecr-credential-provider-config.yaml"

  tasks:
    # ============================================================
    # Install Go (correct version)
    # ============================================================
    - name: Check if correct Go version is installed
      shell: /usr/local/go/bin/go version 2>/dev/null | grep "go{{ go_version }}" || echo "not installed"
      register: go_check
      changed_when: false
      failed_when: false

    - name: Show current Go status
      debug:
        msg: "Go status: {{ go_check.stdout }}"

    # Install Go
    # apt gives 1.18 — too old. cloud-provider-aws requires 1.24+

    - name: Download Go {{ go_version }}
      get_url:
        url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
        dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
        mode: '0644'
      when: "'not installed' in go_check.stdout"

    - name: Remove existing Go installation
      file:
        path: /usr/local/go
        state: absent
      when: "'not installed' in go_check.stdout"

    - name: Extract Go {{ go_version }}
      unarchive:
        src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
        dest: /usr/local
        remote_src: yes
      when: "'not installed' in go_check.stdout"

    - name: Verify correct Go version
      shell: /usr/local/go/bin/go version
      register: go_ver
      changed_when: false

    - name: Show Go version
      debug:
        msg: "{{ go_ver.stdout }}"

    - name: Fail if Go version is wrong
      fail:
        msg: "Expected go{{ go_version }}, got: {{ go_ver.stdout }}"
      when: go_version not in go_ver.stdout

    # ============================================================
    # Clone and build
    # ============================================================
    - name: Remove old clone if exists
      file:
        path: /tmp/cloud-provider-aws
        state: absent

    - name: Clone cloud-provider-aws at matching version
      git:
        repo: https://github.com/kubernetes/cloud-provider-aws.git
        dest: /tmp/cloud-provider-aws
        version: "{{ k8s_version }}"
        depth: 1

    - name: Build ecr-credential-provider binary
      shell: /usr/local/go/bin/go build -o {{ ecr_provider_bin }} ./cmd/ecr-credential-provider/
      args:
        chdir: /tmp/cloud-provider-aws
        executable: /bin/bash
      environment:
        HOME: /root
        GOPATH: /tmp/gopath
        GOCACHE: /tmp/gocache

    - name: Set binary permissions
      file:
        path: "{{ ecr_provider_bin }}"
        mode: '0755'

    - name: Verify binary was built
      shell: "{{ ecr_provider_bin }} --version || {{ ecr_provider_bin }} -h || echo 'binary exists'"
      register: binary_check
      changed_when: false
      failed_when: false

    - name: Show binary check
      debug:
        msg: "{{ binary_check.stdout }}"

    # ============================================================
    # Configure kubelet
    # ============================================================
    - name: Create credential provider config
      copy:
        dest: "{{ ecr_provider_config }}"
        mode: '0644'
        content: |
          apiVersion: kubelet.config.k8s.io/v1
          kind: CredentialProviderConfig
          providers:
            - name: ecr-credential-provider
              matchImages:
                - "*.dkr.ecr.*.amazonaws.com"
                - "*.dkr.ecr.*.amazonaws.com.cn"
              defaultCacheDuration: "12h"
              apiVersion: credentialprovider.kubelet.k8s.io/v1

    # Use /etc/default/kubelet — the kubelet service file at
    # /usr/lib/systemd/system/kubelet.service.d/10-kubeadm.conf
    # says to use this file for KUBELET_EXTRA_ARGS overrides

    - name: Create /etc/default/kubelet if not exists
      file:
        path: /etc/default/kubelet
        state: touch
        mode: '0644'

    - name: Set KUBELET_EXTRA_ARGS in /etc/default/kubelet
      lineinfile:
        path: /etc/default/kubelet
        regexp: '^KUBELET_EXTRA_ARGS='
        line: 'KUBELET_EXTRA_ARGS=--image-credential-provider-config={{ ecr_provider_config }} --image-credential-provider-bin-dir=/usr/local/bin'
        state: present
      register: kubelet_updated

    - name: Reload and restart kubelet
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes
      when: kubelet_updated.changed

    # ============================================================
    # Cleanup
    # ============================================================
    - name: Cleanup build files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/cloud-provider-aws
        - "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
        - /tmp/gopath
        - /tmp/gocache

    - name: Show final summary
      debug:
        msg: |
          Setup Complete!
          
          Go version:  {{ go_ver.stdout }}
          Binary:      {{ ecr_provider_bin }}
          Config:      {{ ecr_provider_config }}
          Kubelet:     /etc/default/kubelet
          
          Verify with:
            ps aux | grep kubelet | grep credential-provider
          
          Then remove imagePullSecrets from deployments and redeploy:
            kubectl rollout restart deployment/provider-search -n provider-search
